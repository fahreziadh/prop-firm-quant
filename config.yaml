prop_firm:
  name: FundedNext
  account_size: 100000
  max_daily_drawdown_pct: 5.0
  max_total_drawdown_pct: 10.0
  profit_target_pct: 10.0
  risk_per_trade_pct: 1.0

instruments:
  XAUUSD:
    yfinance_symbol: "GC=F"
    pip_value: 0.01
    default_timeframe: "1h"
  EURUSD:
    yfinance_symbol: "EURUSD=X"
    pip_value: 0.0001
    default_timeframe: "1h"
  GBPUSD:
    yfinance_symbol: "GBPUSD=X"
    pip_value: 0.0001
    default_timeframe: "1h"
  NAS100:
    yfinance_symbol: "NQ=F"
    pip_value: 0.25
    default_timeframe: "1h"

news_filter:
  enabled: true
  window_minutes: 60
  impact_levels: ["high"]

backtest:
  default_period: "6mo"
  commission: 0.0002
  slippage: 0.0001

strategies:
  ema_cross:
    fast_period: 9
    slow_period: 21
    atr_period: 14
    atr_sl_multiplier: 1.5
    atr_tp_multiplier: 3.0
  structure_break:
    lookback: 20
    atr_period: 14
    atr_sl_multiplier: 1.0
    atr_tp_multiplier: 2.5
  sr_bounce:
    lookback: 50
    zone_threshold: 0.002
    atr_period: 14
    atr_sl_multiplier: 1.0
    atr_tp_multiplier: 2.0
  rsi_divergence:
    rsi_period: 14
    ema_period: 20
    atr_period: 14
    swing_window: 3
    atr_sl_multiplier: 1.5
    atr_tp_multiplier: 3.0
  london_breakout:
    asian_start: 0
    asian_end: 7
    london_start: 7
    london_end: 10
    tp_multiplier: 1.5
    atr_period: 14
  macd_ob:
    atr_period: 14
    ob_lookback: 30
    atr_sl_multiplier: 1.0
    atr_tp_multiplier: 2.0
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
